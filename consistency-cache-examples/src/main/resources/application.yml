server:
  port: 8080

spring:
  boot:
    admin:
      client:
        url: http://localhost:1080
        instance:
          metadata:
            user.name: admin
            user.password: admin
  hcc:
    cache:
      enabled: true
      metrics:
        enabled: true
      local:
        initialCapacity: 1000
      hotspot:
        readHotKeyThreshold: 80.1
      circuitBreaker:
        failureThreshold: 10
      cacheEvict:
        compensationPeriodSeconds: 1
  redis:
    #redisson:
    #  file: classpath:redisson-config.yml
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 2000ms

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/consistency-cache?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

